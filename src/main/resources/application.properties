spring.application.name=projectit210

# ===============================
# 1. DATABASE CONFIGURATION (MySQL)
# ===============================
# Thay ??i 'smart_healthcare' thŕnh tęn Database b?n ?ă t?o trong MySQL WorkBench/Navicat
spring.datasource.url=jdbc:mysql://localhost:3306/healthcare?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 2. JPA / HIBERNATE CONFIGURATION
# ===============================
# 'update': T? ??ng t?o b?ng d?a tręn các Entity b?n ?ă code mŕ không lŕm m?t d? li?u c?
spring.jpa.hibernate.ddl-auto=update

# Hi?n th? câu l?nh SQL xu?ng Console ?? b?n d? debug (R?t quan tr?ng khi lŕm bŕi t?p l?n)
spring.jpa.show-sql=true
