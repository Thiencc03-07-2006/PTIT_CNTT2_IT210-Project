<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Bảng điều khiển')}">
        <meta charset="UTF-8">
        <title>Dashboard - Smart Healthcare</title>
        <!-- Thêm Chart.js để vẽ biểu đồ -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Sử dụng fragment sidebar với activePage là 'dashboard' -->
                <nav th:replace="~{fragments/layout :: sidebar('dashboard')}"></nav>

                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                        <h1 class="h2 text-primary">Tổng quan hệ thống</h1>
                        <div class="btn-toolbar mb-2 mb-md-0">
                            <span class="badge badge-info p-2">
                                <i class="fas fa-calendar-alt mr-1"></i> Năm <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span>
                            </span>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Biểu đồ doanh thu theo tháng -->
                        <div class="col-md-7 mb-4">
                            <div class="card shadow border-0">
                                <div class="card-header bg-white font-weight-bold">
                                    <i class="fas fa-money-bill-wave mr-2 text-success"></i>Doanh thu theo tháng
                                </div>
                                <div class="card-body">
                                    <canvas id="revenueChart" height="200"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- Top bác sĩ -->
                        <div class="col-md-5 mb-4">
                            <div class="card shadow border-0">
                                <div class="card-header bg-white font-weight-bold">
                                    <i class="fas fa-medal mr-2 text-warning"></i>Top 5 bác sĩ tiêu biểu
                                </div>
                                <div class="card-body">
                                    <canvas id="topDoctorsChart" height="285"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bảng chi tiết bổ sung (Tùy chọn) -->
                    <div class="row mt-2">
                        <div class="col-12">
                            <div class="card shadow border-0">
                                <div class="card-header bg-white font-weight-bold">
                                    Dữ liệu thống kê chi tiết
                                </div>
                                <div class="card-body p-0">
                                    <table class="table table-hover mb-0">
                                        <thead class="bg-light">
                                            <tr>
                                                <th>Tháng</th>
                                                <th>Tổng doanh thu (VNĐ)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="row : ${revenueData}">
                                                <td th:text="'Tháng ' + ${row.month}"></td>
                                                <td class="text-success font-weight-bold"
                                                    th:text="${#numbers.formatDecimal(row.revenue, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <!-- Script vẽ biểu đồ -->
        <script th:inline="javascript">
            /*
               Sử dụng toán tử '|| []' để đảm bảo nếu biến null/undefined
               thì vẫn là một mảng rỗng, tránh lỗi .map()
            */
            const revenueData = /*[[${revenueData}]]*/ [];
            const topDoctors = /*[[${topDoctors}]]*/ [];

            // Kiểm tra log trong Console của trình duyệt (F12) để xem dữ liệu thực tế
            console.log("Dữ liệu doanh thu nhận được:", revenueData);
            console.log("Dữ liệu bác sĩ nhận được:", topDoctors);

            // 1. Xử lý Biểu đồ Doanh thu
            // Kiểm tra tên thuộc tính (month hay MONTH) tùy theo Database Driver
            const revLabels = revenueData.map(d => 'Tháng ' + (d.month || d.MONTH || '?'));
            const revValues = revenueData.map(d => (d.revenue || d.REVENUE || 0));

            if (revenueData.length > 0) {
                new Chart(document.getElementById('revenueChart'), {
                    type: 'bar',
                    data: {
                        labels: revLabels,
                        datasets: [{
                            label: 'Doanh thu (VNĐ)',
                            data: revValues,
                            backgroundColor: 'rgba(40, 167, 69, 0.6)',
                            borderColor: '#28a745',
                            borderWidth: 1
                        }]
                    },
                    options: { scales: { y: { beginAtZero: true } } }
                });
            }

            // 2. Xử lý Biểu đồ Top Bác sĩ
            const docLabels = topDoctors.map(d => (d.doctorName || d.DOCTORNAME || 'N/A'));
            const docValues = topDoctors.map(d => (d.visitCount || d.VISITCOUNT || 0));

            if (topDoctors.length > 0) {
                new Chart(document.getElementById('topDoctorsChart'), {
                    type: 'doughnut',
                    data: {
                        labels: docLabels,
                        datasets: [{
                            data: docValues,
                            backgroundColor: ['#007bff', '#6610f2', '#6f42c1', '#e83e8c', '#fd7e14']
                        }]
                    },
                    options: { plugins: { legend: { position: 'bottom' } } }
                });
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
