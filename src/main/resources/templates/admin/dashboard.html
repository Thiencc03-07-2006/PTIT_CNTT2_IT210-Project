<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Dashboard')}">
        <meta charset="UTF-8">
        <title>Dashboard - Smart Healthcare</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <style>
            body {
                background-color: #f4f7f6;
            }

            .sidebar {
                min-height: 100vh;
                background: #fff;
                border-right: 1px solid #dee2e6;
            }

            .nav-link {
                color: #333;
                font-weight: 500;
                padding: 12px 20px;
            }

            .nav-link:hover, .nav-link.active {
                background: #e9ecef;
                color: #007bff;
            }

            .stat-card {
                border: none;
                border-radius: 10px;
                transition: transform 0.2s;
            }

            .stat-card:hover {
                transform: translateY(-5px);
            }
        </style>
    </head>
    <body>

        <div class="container-fluid">
            <div class="row">
                <nav th:replace="~{fragments/layout :: sidebar('dashboard')}"></nav>
                <main role="main" class="col-md-10 ml-sm-auto px-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Bảng điều khiển</h1>
                        <div class="btn-toolbar mb-2 mb-md-0">
                            <div class="d-flex align-items-center bg-light border rounded-pill px-3 py-1 shadow-sm">
                                <!-- Phần Avatar và Link Profile -->
                                <a th:href="@{/profile}"
                                   class="d-flex align-items-center text-decoration-none text-dark">
                                    <img th:src="${'https://ui-avatars.com/api/?name=' + user.profile.fullName + '&background=random&size=128'}"
                                         class="rounded-circle border border-white shadow-sm"
                                         width="32" height="32"
                                         th:alt="${user.profile.fullName}">

                                    <!-- Lời chào -->
                                    <span class="ms-2 fw-bold" style="font-size: 0.9rem; margin-left: 10px;">
                <span class="text-muted fw-normal">Xin chào,</span>
                <span th:text="${user.profile.fullName}" class="text-primary">User Name</span>
            </span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-3 mb-4" th:if="${user.role.name() != 'ADMIN'}">
                            <div class="card stat-card shadow-sm bg-primary text-white">
                                <div class="card-body">
                                    <h6 class="text-uppercase"
                                        th:text="${user.role.name() == 'DOCTOR' ? 'Bệnh nhân chờ' : 'Lịch hẹn của tôi'}">
                                        Tiêu đề</h6>
                                    <h2 class="font-weight-bold">05</h2>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3 mb-4" th:if="${user.role.name() == 'ADMIN'}">
                            <div class="card stat-card shadow-sm bg-danger text-white">
                                <div class="card-body">
                                    <h6 class="text-uppercase">Tổng số người dùng</h6>
                                    <h2 class="font-weight-bold">120</h2>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3 mb-4">
                            <div class="card stat-card shadow-sm bg-success text-white">
                                <div class="card-body">
                                    <h6 class="text-uppercase">Hồ sơ hoàn tất</h6>
                                    <h2 class="font-weight-bold">100%</h2>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3 mb-4">
                            <div class="card stat-card shadow-sm bg-warning text-white">
                                <div class="card-body">
                                    <h6 class="text-uppercase">Đơn thuốc</h6>
                                    <h2 class="font-weight-bold">03</h2>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mt-2">
                        <div class="card-header bg-white font-weight-bold">Lịch hẹn gần đây</div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0">
                                <thead class="thead-light">
                                    <tr>
                                        <th>Mã số</th>
                                        <th>Bác sĩ/Bệnh nhân</th>
                                        <th>Thời gian</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>#AP-1002</td>
                                        <td>Bs. Nguyễn Văn A</td>
                                        <td>14:30 - 08/05/2026</td>
                                        <td><span class="badge badge-success">Đã xác nhận</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-primary">Xem</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>#AP-1005</td>
                                        <td>Bs. Trần Thị B</td>
                                        <td>09:15 - 09/05/2026</td>
                                        <td><span class="badge badge-warning">Chờ duyệt</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-primary">Xem</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
