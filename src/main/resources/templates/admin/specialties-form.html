<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head(${specialty.id == null ? 'Thêm mới' : 'Cập nhật'} + ' chuyên khoa')}">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <style>
            body { background-color: #f4f7f6; }
            .specialty-card { border: none; border-radius: 15px; }
        </style>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <nav th:replace="~{fragments/layout :: sidebar('specialties')}"></nav>

                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <!-- Breadcrumb -->
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb bg-transparent p-0">
                            <li class="breadcrumb-item"><a th:href="@{/admin/specialties}">Chuyên khoa</a></li>
                            <li class="breadcrumb-item active" aria-current="page"
                                th:text="${specialty.id == null ? 'Thêm mới' : 'Chỉnh sửa'}"></li>
                        </ol>
                    </nav>

                    <div class="row justify-content-center mt-2">
                        <div class="col-md-8">
                            <div class="card specialty-card shadow">
                                <div class="card-header bg-white py-3 border-bottom-0">
                                    <h4 class="mb-0 text-primary">
                                        <i th:class="${specialty.id == null ? 'fas fa-plus-circle' : 'fas fa-edit'} + ' mr-2'"></i>
                                        <span th:text="${specialty.id == null ? 'Thêm chuyên khoa mới' : 'Cập nhật chuyên khoa'}"></span>
                                    </h4>
                                </div>
                                <div class="card-body">

                                    <!-- Thông báo lỗi chung (Ví dụ: Trùng tên từ Backend) -->
                                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                        <i class="fas fa-exclamation-triangle mr-2"></i>
                                        <span th:text="${error}"></span>
                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>

                                    <!-- Thông báo thành công -->
                                    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                                        <i class="fas fa-check-circle mr-2"></i>
                                        <span th:text="${message}"></span>
                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>

                                    <form th:action="@{/admin/specialties/save}" th:object="${specialty}" method="post">
                                        <!-- Hidden ID để xử lý cập nhật -->
                                        <input type="hidden" th:field="*{id}">

                                        <div class="form-group">
                                            <label class="font-weight-bold">Tên chuyên khoa</label>
                                            <input type="text" class="form-control form-control-lg"
                                                   th:field="*{name}"
                                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                                   placeholder="VD: Khoa Nội, Khoa Nhi, Răng Hàm Mặt..." >
                                            <!-- Hiển thị lỗi validate field -->
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                                 th:text="${#fields.errors('name')[0]}"></div>
                                        </div>

                                        <div class="form-group mt-4">
                                            <label class="font-weight-bold">Mô tả chi tiết</label>
                                            <textarea class="form-control" th:field="*{description}" rows="6"
                                                      placeholder="Nhập giới thiệu, chức năng nhiệm vụ của chuyên khoa..."
                                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"></textarea>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                                 th:text="${#fields.errors('description')[0]}"></div>
                                        </div>

                                        <hr class="my-4">

                                        <div class="row">
                                            <div class="col-6">
                                                <a th:href="@{/admin/specialties}" class="btn btn-light btn-block btn-lg border">
                                                    Hủy bỏ
                                                </a>
                                            </div>
                                            <div class="col-6">
                                                <button type="submit" class="btn btn-primary btn-block btn-lg shadow-sm">
                                                    <i class="fas fa-save mr-2"></i> Lưu thông tin
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
