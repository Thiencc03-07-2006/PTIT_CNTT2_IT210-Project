<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Quản lý chuyên khoa')}"></head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Reuse Sidebar -->
                <nav th:replace="~{fragments/layout :: sidebar('specialties')}"></nav>

                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                        <h1 class="h2 text-primary"><i class="fas fa-stethoscope mr-2"></i>Quản lý chuyên khoa</h1>
                        <div class="btn-toolbar mb-2 mb-md-0">
                            <a th:href="@{/admin/specialties/add}" class="btn btn-sm btn-primary shadow-sm">
                                <i class="fas fa-plus mr-1"></i> Thêm chuyên khoa mới
                            </a>
                        </div>
                    </div>

                    <!-- Alert Messages -->
                    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${message}"></span>
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>

                    <!-- Table Card -->
                    <div class="card shadow-sm border-0 mt-3">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="thead-light">
                                        <tr>
                                            <th style="width: 5%">ID</th>
                                            <th style="width: 25%">Tên chuyên khoa</th>
                                            <th style="width: 50%">Mô tả</th>
                                            <th style="width: 20%" class="text-center">Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="sp : ${specialties}">
                                            <td th:text="${sp.id}" class="font-weight-bold"></td>
                                            <td th:text="${sp.name}" class="text-primary font-weight-bold"></td>
                                            <td th:text="${#strings.abbreviate(sp.description, 100)}"></td>
                                            <td class="text-center">
                                                <a th:href="@{/admin/specialties/edit/{id}(id=${sp.id})}"
                                                   class="btn btn-sm btn-outline-info mr-1" title="Chỉnh sửa">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                                <a th:href="@{/admin/specialties/delete/{id}(id=${sp.id})}"
                                                   class="btn btn-sm btn-outline-danger"
                                                   onclick="return confirm('Bạn có chắc chắn muốn xóa chuyên khoa này?')"
                                                   title="Xóa">
                                                    <i class="fas fa-trash"></i>
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(specialties)}">
                                            <td colspan="4" class="text-center py-5 text-muted">
                                                Chưa có chuyên khoa nào trong hệ thống.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
