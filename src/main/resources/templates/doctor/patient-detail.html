<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Chi tiết bệnh nhân')}">
        <meta charset="UTF-8">
        <title>Hồ sơ bệnh nhân - Smart Healthcare</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <style>
            body { background-color: #f4f7f6; }
            .detail-card { border: none; border-radius: 15px; }
            .border-left-primary { border-left: 0.25rem solid #4e73df !important; }
            .history-item { transition: all 0.2s; }
            .history-item:hover { background-color: #f8f9fc; }
        </style>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <nav th:replace="~{fragments/layout :: sidebar('patients')}"></nav>

                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="d-flex align-items-center mb-4">
                        <a th:href="@{/doctor/patients}" class="btn btn-sm btn-light shadow-sm mr-3">
                            <i class="fas fa-arrow-left text-primary"></i>
                        </a>
                        <h4 class="mb-0 text-gray-800">Hồ sơ bệnh nhân</h4>
                    </div>

                    <div class="row">
                        <!-- Cột trái: Thông tin cá nhân -->
                        <div class="col-md-4 mb-4">
                            <div class="card detail-card shadow border-left-primary">
                                <div class="card-body">
                                    <div class="text-center mb-4">
                                        <div class="mb-3">
<!--                                            <i class="fas fa-user-circle fa-5x text-light"></i>-->
                                            <img th:src="${'https://ui-avatars.com/api/?name=' + patient.profile.fullName + '&background=random'}" class="rounded-circle mx-auto" width="80" th:alt="${patient.profile.fullName}">
                                        </div>
                                        <h5 class="font-weight-bold text-primary" th:text="${patient.profile.fullName}"></h5>
                                        <span class="badge badge-pill badge-light border" th:text="${patient.profile.gender}"></span>
                                    </div>
                                    <div class="mt-4">
                                        <div class="mb-3">
                                            <label class="small font-weight-bold text-muted mb-0">Số điện thoại</label>
                                            <p class="text-dark mb-0" th:text="${patient.profile.phone}"></p>
                                        </div>
                                        <div class="mb-3">
                                            <label class="small font-weight-bold text-muted mb-0">Ngày sinh</label>
                                            <p class="text-dark mb-0" th:text="${patient.profile.dob}"></p>
                                        </div>
                                        <div class="mb-3">
                                            <label class="small font-weight-bold text-muted mb-0">Địa chỉ</label>
                                            <p class="text-dark mb-0 small" th:text="${patient.profile.address}"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Cột phải: Lịch sử khám -->
                        <div class="col-md-8">
                            <div class="card detail-card shadow">
                                <div class="card-header bg-white py-3">
                                    <h6 class="m-0 font-weight-bold text-primary"><i class="fas fa-history mr-2"></i>Lịch sử các ca khám</h6>
                                </div>
                                <div class="card-body">
                                    <div th:if="${#lists.isEmpty(history)}" class="text-center py-5">
                                        <i class="fas fa-folder-open fa-3x text-gray-200 mb-3"></i>
                                        <p class="text-muted">Chưa có hồ sơ khám bệnh nào.</p>
                                    </div>

                                    <div th:each="record : ${history}" class="history-item mb-4 p-3 border-bottom rounded">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <h6 class="text-dark font-weight-bold mb-0">
                                                <i class="fas fa-calendar-check text-success mr-2"></i>
                                                Ngày khám: <span th:text="${#temporals.format(record.appointment.appointmentDate, 'dd/MM/yyyy')}"></span>
                                            </h6>
                                            <span class="badge badge-success-soft text-success border border-success px-3">Hoàn thành</span>
                                        </div>

                                        <div class="row mt-3">
                                            <div class="col-sm-6">
                                                <p class="small mb-1 text-muted font-weight-bold">TRIỆU CHỨNG</p>
                                                <p class="text-dark mb-2" th:text="${record.symptoms}"></p>
                                            </div>
                                            <div class="col-sm-6">
                                                <p class="small mb-1 text-muted font-weight-bold">CHẨN ĐOÁN</p>
                                                <p class="text-primary font-weight-bold mb-2" th:text="${record.diagnosis}"></p>
                                            </div>
                                        </div>

                                        <!-- Đơn thuốc -->
                                        <div class="bg-light p-3 mt-2 rounded border-0">
                                            <p class="small font-weight-bold text-muted mb-2"><i class="fas fa-pills mr-1"></i> ĐƠN THUỐC ĐI KÈM:</p>
                                            <div th:each="dt : ${record.prescription.prescriptionDetails}" class="ml-2 mb-1 small d-flex justify-content-between">
                                            <span>
                                                <i class="fas fa-check-circle text-gray-400 mr-1"></i>
                                                <span class="font-weight-bold" th:text="${dt.medicine.name}"></span>
                                                <span class="text-muted">(SL: <span th:text="${dt.quantity}"></span>)</span>
                                            </span>
                                                <span class="font-italic text-secondary" th:text="${dt.usageInstruction}"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
