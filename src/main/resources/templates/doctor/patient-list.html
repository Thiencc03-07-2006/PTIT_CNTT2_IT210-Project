<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Quản lý bệnh nhân')}">
        <meta charset="UTF-8">
        <title>Quản lý bệnh nhân - Smart Healthcare</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <style>
            body { background-color: #f4f7f6; }
            .patient-card { border: none; border-radius: 15px; }
            .table thead th { border-top: none; background-color: #f8f9fc; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
        </style>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Sử dụng Sidebar từ fragment -->
                <nav th:replace="~{fragments/layout :: sidebar('patients')}"></nav>

                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="card patient-card shadow">
                        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                            <h4 class="mb-0 text-primary"><i class="fas fa-users mr-2"></i>Quản lý bệnh nhân</h4>

                            <form class="form-inline" th:action="@{/doctor/patients}" method="get">
                                <div class="input-group">
                                    <input type="text" class="form-control bg-light border-0 small"
                                           name="query" th:value="${query}"
                                           placeholder="Tên hoặc số điện thoại..." aria-label="Search">
                                    <div class="input-group-append">
                                        <button class="btn btn-primary" type="submit">
                                            <i class="fas fa-search fa-sm"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="text-muted">
                                        <tr>
                                            <th class="pl-4">Họ tên</th>
                                            <th>Giới tính</th>
                                            <th>Ngày sinh</th>
                                            <th>Số điện thoại</th>
                                            <th class="text-center">Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="u : ${patients}">
                                            <td class="pl-4 font-weight-bold text-dark" th:text="${u.profile.fullName}"></td>
                                            <td>
                                            <span th:class="${u.profile.gender == 'Nam' ? 'badge badge-info' : 'badge badge-danger'}"
                                                  th:text="${u.profile.gender}"></span>
                                            </td>
                                            <td th:text="${u.profile.dob}"></td>
                                            <td th:text="${u.profile.phone}"></td>
                                            <td class="text-center">
                                                <a th:href="@{/doctor/patients/detail/{id}(id=${u.id})}"
                                                   class="btn btn-outline-primary btn-sm px-3">
                                                    <i class="fas fa-eye mr-1"></i> Chi tiết
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(patients)}">
                                            <td colspan="5" class="text-center py-4 text-muted">Không tìm thấy bệnh nhân nào.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
