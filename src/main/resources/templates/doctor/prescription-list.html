<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Danh sách đơn thuốc')}">
        <meta charset="UTF-8">
        <title>Danh sách đơn thuốc - Smart Healthcare</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <nav th:replace="~{fragments/layout :: sidebar('prescriptions')}"></nav>
                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                        <h1 class="h2 text-primary"><i class="fas fa-pills mr-2"></i>Đơn thuốc chờ phát</h1>
                    </div>

                    <!-- Thông báo -->
                    <div th:if="${message}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                        <i class="fas fa-check-circle mr-2"></i> <span th:text="${message}"></span>
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                        <i class="fas fa-exclamation-triangle mr-2"></i> <span th:text="${error}"></span>
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                    </div>

                    <div class="card shadow border-0">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="border-0">Mã đơn</th>
                                            <th class="border-0">Bệnh nhân</th>
                                            <th class="border-0">Bác sĩ kê đơn</th>
                                            <th class="border-0">Ngày kê</th>
                                            <th class="border-0 text-center">Trạng thái</th>
                                            <th class="border-0 text-right">Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="p : ${prescriptions}">
                                            <td class="align-middle font-weight-bold" th:text="'#' + ${p.id}">#1</td>
                                            <td class="align-middle">
                                                <div class="font-weight-bold" th:text="${p.medicalRecord.appointment.patient.profile.fullName}">Nguyễn Văn A</div>
                                            </td>
                                            <td class="align-middle" th:text="${p.medicalRecord.appointment.doctor.user.profile.fullName}">BS. Trần B</td>
                                            <td class="align-middle" th:text="${#temporals.format(p.medicalRecord.appointment.appointmentDate, 'dd/MM/yyyy')}">25/10/2023</td>
                                            <td class="align-middle text-center">
                                                <span class="badge badge-warning p-2" th:if="${p.status.name() == 'PENDING'}">
                                                    <i class="fas fa-clock mr-1"></i> Chờ phát
                                                </span>
                                            </td>
                                            <td class="align-middle text-right">
                                                <a th:href="@{/doctor/prescriptions/{id}(id=${p.id})}" class="btn btn-primary btn-sm shadow-sm px-3">
                                                    Chi tiết <i class="fas fa-arrow-right ml-1"></i>
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(prescriptions)}">
                                            <td colspan="6" class="text-center py-5 text-muted">
                                                <i class="fas fa-box-open fa-3x mb-3 d-block"></i>
                                                Hiện không có đơn thuốc nào cần phát.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
