<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Đặt lịch khám')}">
        <meta charset="UTF-8">
        <title>Đặt lịch khám - Smart Healthcare</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <style>
            body { background-color: #f4f7f6; }
            .booking-card { border: none; border-radius: 15px; }
        </style>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <nav th:replace="~{fragments/layout :: sidebar('booking')}"></nav>
                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <div class="card booking-card shadow">
                                <div class="card-header bg-white py-3">
                                    <h4 class="mb-0 text-primary"><i class="fas fa-calendar-check mr-2"></i>Đăng ký lịch khám</h4>
                                </div>
                                <div class="card-body">
                                    <!-- Thông báo lỗi/thành công từ FlashAttributes -->
                                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

                                    <form th:action="@{/appointments/book}"
                                          th:object="${bookingRequest}"
                                          method="post" id="bookingForm">

                                        <div class="row">
                                            <!-- 1. Chọn Chuyên khoa -->
                                            <!-- 1. Chọn Chuyên khoa -->
                                            <div class="col-md-6 form-group">
                                                <label class="font-weight-bold">1. Chọn Chuyên khoa</label>
                                                <select th:field="*{specialtyId}" class="form-control"
                                                        th:classappend="${#fields.hasErrors('specialtyId')} ? 'is-invalid' : ''"
                                                        onchange="changeSpecialty(this.value)">
                                                    <option value="">-- Chọn chuyên khoa --</option>
                                                    <option th:each="sp : ${specialties}"
                                                            th:value="${sp.id}"
                                                            th:text="${sp.name}">
                                                        <!-- Không cần th:selected ở đây vì th:field đã đảm nhiệm -->
                                                    </option>
                                                </select>
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('specialtyId')}"
                                                     th:text="${#fields.errors('specialtyId')[0]}"></div>
                                            </div>

                                            <!-- 2. Chọn bác sĩ -->
                                            <div class="col-md-6 form-group">
                                                <label class="font-weight-bold">2. Chọn bác sĩ</label>
                                                <select th:field="*{doctorId}" class="form-control"
                                                        th:classappend="${#fields.hasErrors('doctorId')} ? 'is-invalid' : ''">
                                                    <option value="">-- Chọn bác sĩ --</option>
                                                    <option th:each="d : ${doctors}"
                                                            th:value="${d.id}"
                                                            th:text="${d.user.profile.fullName}">
                                                    </option>
                                                </select>
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('doctorId')}"
                                                     th:text="${#fields.errors('doctorId')[0]}"></div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <!-- 3. Chọn Ngày khám -->
                                            <div class="col-md-6 form-group">
                                                <label class="font-weight-bold">3. Chọn Ngày khám</label>
                                                <input type="date" class="form-control" th:field="*{appointmentDate}"
                                                       th:classappend="${#fields.hasErrors('appointmentDate')} ? 'is-invalid' : ''">
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('appointmentDate')}"
                                                     th:text="${#fields.errors('appointmentDate')[0]}"></div>
                                            </div>

                                            <!-- 4. Chọn Khung giờ -->
                                            <div class="col-md-6 form-group">
                                                <label class="font-weight-bold">4. Chọn Khung giờ</label>
                                                <select class="form-control" th:field="*{appointmentTime}"
                                                        th:classappend="${#fields.hasErrors('appointmentTime')} ? 'is-invalid' : ''">
                                                    <option value="">-- Chọn giờ --</option>
                                                    <option value="08:00">08:00 AM</option>
                                                    <option value="09:00">09:00 AM</option>
                                                    <option value="10:00">10:00 AM</option>
                                                    <option value="14:00">02:00 PM</option>
                                                    <option value="15:00">03:00 PM</option>
                                                </select>
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('appointmentTime')}"
                                                     th:text="${#fields.errors('appointmentTime')[0]}"></div>
                                            </div>
                                        </div>

                                        <!-- Triệu chứng -->
                                        <div class="form-group">
                                            <label class="font-weight-bold">Ghi chú triệu chứng</label>
                                            <textarea class="form-control" th:field="*{notes}" rows="3"
                                                      placeholder="Nhập tình trạng sức khỏe hiện tại của bạn..."
                                                      th:classappend="${#fields.hasErrors('notes')} ? 'is-invalid' : ''"></textarea>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('notes')}"
                                                 th:text="${#fields.errors('notes')[0]}"></div>
                                        </div>

                                        <hr>
                                        <button type="submit" class="btn btn-primary btn-block btn-lg shadow-sm">
                                            Xác nhận đặt lịch ngay
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function changeSpecialty(id) {
                if (id) {
                    window.location.href = '/appointments/book?specialtyId=' + id;
                }
            }
        </script>
    </body>
</html>
