<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/layout :: header_head('Hồ sơ cá nhân')}">
        <meta charset="UTF-8">
        <title>Hồ sơ cá nhân - Smart Healthcare</title>
        <!-- Các link này sẽ được thay thế bởi fragment nhưng để đây để dễ xem layout -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <style>
            body { background-color: #f4f7f6; }
            .profile-card { border: none; border-radius: 15px; }
            .avatar-section { background: #fff; border-radius: 15px; }
        </style>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Sử dụng Sidebar từ fragment -->
                <nav th:replace="~{fragments/layout :: sidebar('profile')}"></nav>

                <main class="col-md-10 ml-sm-auto px-4 pt-4">
                    <div class="row">
                        <!-- Cột trái: Ảnh đại diện & Thông tin nhanh -->
                        <div class="col-md-4 mb-4">
                            <div class="card profile-card shadow text-center py-4 avatar-section">
                                <div class="position-relative d-inline-block mx-auto">
                                    <img th:src="${'https://ui-avatars.com/api/?name=' + profile.fullName + '&background=random&size=128'}"
                                         class="rounded-circle border shadow-sm"
                                         width="120"
                                         th:alt="${profile.fullName}">
                                </div>
                                <div class="card-body">
                                    <h4 class="font-weight-bold mb-1" th:text="${profile.fullName}">Họ Tên</h4>
                                    <span class="badge badge-pill badge-primary px-3" th:text="${user.role}">Role</span>
                                </div>
                            </div>
                        </div>

                        <!-- Cột phải: Form cập nhật thông tin -->
                        <div class="col-md-8">
                            <div class="card profile-card shadow">
                                <div class="card-header bg-white py-3">
                                    <h4 class="mb-0 text-primary">
                                        <i class="fas fa-user-edit mr-2"></i>Quản lý hồ sơ cá nhân
                                    </h4>
                                </div>
                                <div class="card-body">
                                    <!-- Thông báo thành công -->
                                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                                        <i class="fas fa-check-circle mr-1"></i>
                                        <span th:text="${successMessage}">Cập nhật thành công!</span>
                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>

                                    <!-- Form mapping trực tiếp tới model 'profile' -->
                                    <form th:action="@{/profile/update}" method="post" th:object="${profile}">
                                        <input type="hidden" th:field="*{id}">

                                        <div class="form-group">
                                            <label class="font-weight-bold">Họ và tên</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                                </div>
                                                <input type="text" class="form-control"
                                                       th:field="*{fullName}"
                                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                                       placeholder="Nhập họ tên đầy đủ">
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                                            </div>
                                        </div>

                                        <div class="form-row">
                                            <div class="form-group col-md-6">
                                                <label class="font-weight-bold">Ngày sinh</label>
                                                <input type="date" class="form-control"
                                                       th:field="*{dob}"
                                                       th:classappend="${#fields.hasErrors('dob')} ? 'is-invalid' : ''">
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}"></div>
                                            </div>
                                            <div class="form-group col-md-6">
                                                <label class="font-weight-bold">Giới tính</label>
                                                <select class="form-control"
                                                        th:field="*{gender}"
                                                        th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid' : ''">
                                                    <option value="MALE">Nam</option>
                                                    <option value="FEMALE">Nữ</option>
                                                    <option value="OTHER">Khác</option>
                                                </select>
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                                            </div>
                                        </div>

                                        <div class="form-group">
                                            <label class="font-weight-bold">Số điện thoại</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                                </div>
                                                <input type="text" class="form-control"
                                                       th:field="*{phone}"
                                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                                       placeholder="Số điện thoại liên lạc">
                                                <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                            </div>
                                        </div>

                                        <div class="form-group">
                                            <label class="font-weight-bold">Địa chỉ cư trú</label>
                                            <textarea class="form-control" rows="3"
                                                      th:field="*{address}"
                                                      th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''"
                                                      placeholder="Nhập địa chỉ cụ thể..."></textarea>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                                        </div>

                                        <hr>
                                        <div class="text-right">
                                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
                                                <i class="fas fa-save mr-2"></i>Lưu thay đổi
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- JS Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
